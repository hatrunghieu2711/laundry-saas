# Trang tracking công khai — track.giatui2h.com (Stage 5.2).
# Serve trang tĩnh track-site/ + proxy /public/* về backend FastAPI (docker).
# Cài: cp scripts/nginx-track.conf /etc/nginx/sites-available/track
#      ln -s /etc/nginx/sites-available/track /etc/nginx/sites-enabled/track
#      nginx -t && systemctl reload nginx
#      certbot --nginx -d track.giatui2h.com   # tự chèn block 443 + redirect 80→443
#
# Bảo mật: KHÔNG lộ /api/* ở subdomain này — chỉ /public/* (read-only, rate-limited).

server {
    listen 80;
    listen [::]:80;
    server_name track.giatui2h.com;

    root /opt/laundry-saas/track-site;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── API công khai: proxy về backend (127.0.0.1:8010) ──────────────
    # X-Real-IP = $remote_addr (GHI ĐÈ, client không giả mạo được) → rate limit theo IP.
    location /public/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html: KHÔNG cache (đổi nội dung trang là thấy ngay).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # /track/{order_code} và mọi path khác → trang tĩnh (JS đọc mã từ URL).
    location / {
        try_files $uri /index.html;
    }
}
