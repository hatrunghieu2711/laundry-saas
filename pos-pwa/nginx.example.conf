# nginx mẫu cho POS PWA: serve dist/ tĩnh + proxy /api về backend.
# Backend (docker compose) expose ở 127.0.0.1:8010 trên host.
#
# Cài: copy/sửa file này vào /etc/nginx/sites-available/, symlink sang
# sites-enabled/, rồi `nginx -t && systemctl reload nginx`.
#
# LƯU Ý cookie: refresh_token là cookie Secure → BẮT BUỘC chạy HTTPS thật
# (Let's Encrypt) thì refresh mới hoạt động. Khối HTTP dưới chỉ để minh hoạ;
# production hãy bọc trong server{} TLS (certbot tự thêm listen 443 + ssl_*).

server {
    listen 80;
    server_name pos.giatui2h.vn;  # đổi theo domain thật

    # Thư mục build (kết quả `npm run build`)
    root /opt/laundry-saas/pos-pwa/dist;
    index index.html;

    # gzip cho asset text
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── API: proxy về backend FastAPI ───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # backend cần để biết HTTPS
        # WebSocket (nếu sau này có realtime)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ── Service worker & manifest: KHÔNG cache (để cập nhật ngay) ────
    location = /sw.js          { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js  { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # ── Asset có hash trong tên: cache dài ───────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: mọi route khác → index.html (client routing) ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
