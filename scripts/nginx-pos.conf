# POS PWA — pos.giatui2h.com. Serve dist/ tĩnh + proxy /api về backend.
# Template TRƯỚC certbot (certbot --nginx tự chèn block 443 + redirect 80→443).
# Cài: cp scripts/nginx-pos.conf /etc/nginx/sites-available/pos
#      ln -s /etc/nginx/sites-available/pos /etc/nginx/sites-enabled/pos
#      nginx -t && systemctl reload nginx
#      certbot --nginx -d pos.giatui2h.com

server {
    server_name pos.giatui2h.com;

    root /opt/laundry-saas/pos-pwa/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── API: proxy về backend FastAPI (docker, 127.0.0.1:8010) ──────
    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ── Service worker & manifest: KHÔNG cache ──────────────────────
    location = /sw.js               { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js       { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # ── Asset có hash: cache dài ────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Uploads (logo phiếu in, Stage 5.3): serve file tĩnh ─────────
    # URL có cache-bust (?v=mtime) nên cache được; đổi logo là URL đổi theo.
    location /uploads/ {
        alias /opt/laundry-saas/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 80;
}
