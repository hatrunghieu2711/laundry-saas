<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6feb" />
  <meta name="robots" content="noindex" />
  <title>Tra cứu đơn hàng · Order tracking</title>
  <style>
    :root {
      --accent: #1f6feb;
      --ink: #1F2937;
      --muted: #6B7280;
      --line: #E5E7EB;
      --done: #16A34A;
      --bg: #F8F7F5;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.45;
      min-height: 100vh;
      padding: 16px;
      padding: max(16px, env(safe-area-inset-top)) 16px calc(16px + env(safe-area-inset-bottom));
    }
    .wrap { max-width: 480px; margin: 0 auto; }
    /* Header: tên tiệm động (KHÔNG logo) + phụ đề song ngữ */
    .brand { text-align: center; margin: 10px 0 18px; }
    .brand b { font-size: 20px; display: block; }
    .brand .en { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .card {
      background: #fff; border: 1px solid var(--line); border-radius: 16px;
      padding: 18px 16px; margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .code-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .code { font-size: 26px; font-weight: 800; letter-spacing: .5px; margin-top: 2px; }
    .pickup { margin-top: 10px; font-size: 14px; color: var(--ink); }
    .pickup b { color: var(--ink); }

    /* Nhãn nhóm trạng thái nổi bật (VI đậm + EN nhỏ) */
    .stat { text-align: center; margin-bottom: 16px; }
    .stat .vi { font-size: 20px; font-weight: 800; }
    .stat .en { font-size: 13px; color: var(--muted); margin-top: 1px; }

    /* Thanh trạng thái NGANG 3 bước */
    .steps { display: flex; margin: 4px 0 0; padding: 0; list-style: none; }
    .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; text-align: center; }
    /* đường nối từ chấm này tới chấm trước (bên trái) */
    .step::before {
      content: ""; position: absolute; top: 14px; left: -50%; width: 100%; height: 3px;
      background: var(--line); z-index: 0;
    }
    .step:first-child::before { display: none; }
    .step.done::before { background: var(--done); }
    .dot {
      position: relative; z-index: 1; width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--line); background: #fff;
      display: grid; place-items: center; font-size: 15px; color: transparent;
    }
    .step.done .dot { background: var(--done); border-color: var(--done); color: #fff; }
    .step-name { margin-top: 7px; font-weight: 600; font-size: 13px; color: var(--muted); line-height: 1.25; }
    .step.done .step-name { color: var(--ink); }
    .step-name .en { display: block; font-weight: 400; font-size: 11px; color: var(--muted); }

    .contact { font-size: 14px; }
    .contact h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .contact .name { font-weight: 700; }
    .contact .row { color: var(--muted); margin-top: 2px; }
    .contact a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .state { text-align: center; padding: 40px 16px; color: var(--muted); }
    .state .big { font-size: 40px; margin-bottom: 8px; }
    .state h2 { color: var(--ink); margin: 0 0 6px; font-size: 18px; }
    .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
    .skeleton { color: var(--muted); text-align: center; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <b id="brandName">Tra cứu đơn hàng</b>
      <div class="en">Tra cứu đơn hàng · Order tracking</div>
    </div>
    <div id="app"><div class="skeleton">Đang tải…</div></div>
    <div class="foot" id="foot">Tra cứu đơn hàng · Order tracking</div>
  </div>

  <script>
    // Tiến trình 3 NHÓM (khớp status_group từ BE). Nhãn song ngữ map ở FE (BE không đụng).
    var GROUPS = [
      { key: 'processing', vi: 'Đang xử lý', en: 'Processing' },
      { key: 'ready', vi: 'Đã xong', en: 'Ready' },
      { key: 'delivered', vi: 'Đã giao', en: 'Delivered' }
    ];
    // Nhãn nhóm đầy đủ (headline) — song ngữ.
    var STATUS_LABELS = {
      processing: ['Đang xử lý', 'Processing'],
      ready: ['Đã xong — mời lấy', 'Ready for pickup'],
      delivered: ['Đã giao', 'Delivered']
    };

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

    // ISO UTC -> giờ VN (UTC+7), độc lập múi giờ thiết bị khách.
    function fmtVN(iso) {
      if (!iso) return '';
      try {
        return new Intl.DateTimeFormat('vi-VN', {
          timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit',
          hour: '2-digit', minute: '2-digit', hour12: false
        }).format(new Date(iso));
      } catch (e) { return ''; }
    }

    function getParams() {
      // multi-tenant: /track/{slug}/{code} ; fallback ?slug=&code=
      var m = location.pathname.match(/\/track\/([^/]+)\/([^/?#]+)/);
      if (m) return { slug: decodeURIComponent(m[1]), code: decodeURIComponent(m[2]) };
      var q = new URLSearchParams(location.search);
      return { slug: (q.get('slug') || '').trim(), code: (q.get('code') || '').trim() };
    }

    function renderSteps(data) {
      var idx = GROUPS.map(function (g) { return g.key; }).indexOf(data.status_group);
      if (idx < 0) idx = 0;
      // ⭐ Bước ĐÃ ĐẠT (i <= idx, GỒM bước hiện tại) = XANH ✓; chưa tới = xám rỗng. KHÔNG cam.
      var items = GROUPS.map(function (g, i) {
        var done = i <= idx;
        return '<li class="step ' + (done ? 'done' : '') + '">' +
          '<span class="dot">' + (done ? '✓' : '') + '</span>' +
          '<span class="step-name">' + esc(g.vi) + '<span class="en">' + esc(g.en) + '</span></span>' +
          '</li>';
      }).join('');
      return '<ul class="steps">' + items + '</ul>';
    }

    function render(data) {
      var name = data.tenant_name || '';
      document.getElementById('brandName').textContent = name || 'Tra cứu đơn hàng';
      document.getElementById('foot').textContent = 'Tra cứu đơn hàng · Order tracking' + (name ? ' — ' + name : '');
      if (name) document.title = name + ' · Tra cứu đơn';

      var b = data.branch || {};
      var parts = [];

      // Khối mã đơn. Hẹn lấy CHỈ hiện khi đang xử lý (ready/delivered → ẩn, tránh hiểu nhầm phải đợi).
      var showPickup = data.status_group === 'processing';
      parts.push('<div class="card">' +
        '<div class="code-label">Mã đơn · Order</div>' +
        '<div class="code">' + esc(data.order_code) + '</div>' +
        (showPickup && data.pickup_at
          ? '<div class="pickup">Hẹn lấy · Pickup: <b>' + esc(fmtVN(data.pickup_at)) + '</b></div>' : '') +
        '</div>');

      // Khối trạng thái: nhãn nhóm song ngữ (xanh dương khi xử lý/đã-xong, xanh lá khi đã giao) + thanh ngang.
      var lbl = STATUS_LABELS[data.status_group] || [data.status_label || '', ''];
      var color = data.status_group === 'delivered' ? '#16794a' : '#1f6feb';
      parts.push('<div class="card">' +
        '<div class="stat">' +
          '<div class="vi" style="color:' + color + '">' + esc(lbl[0]) + '</div>' +
          '<div class="en">' + esc(lbl[1]) + '</div>' +
        '</div>' +
        renderSteps(data) + '</div>');

      // Khối chi nhánh.
      parts.push('<div class="card contact"><h3>Chi nhánh · Branch</h3>' +
        '<div class="name">' + esc(b.name || '') + '</div>' +
        (b.address ? '<div class="row">Add: ' + esc(b.address) + '</div>' : '') +
        (b.phone ? '<div class="row">Tel: <a href="tel:' + esc(b.phone) + '">' + esc(b.phone) + '</a></div>' : '') +
        '</div>');

      document.getElementById('app').innerHTML = parts.join('');
    }

    function showState(emoji, title, msg) {
      document.getElementById('app').innerHTML =
        '<div class="card"><div class="state"><div class="big">' + emoji + '</div>' +
        '<h2>' + esc(title) + '</h2><div>' + esc(msg) + '</div></div></div>';
    }

    function load() {
      var p = getParams();
      if (!p.slug || !p.code) { showState('🔎', 'Nhập mã đơn', 'Quét mã QR trên phiếu để tra cứu trạng thái đơn.'); return; }
      fetch('/public/track/' + encodeURIComponent(p.slug) + '/' + encodeURIComponent(p.code), { headers: { 'Accept': 'application/json' } })
        .then(function (r) {
          if (r.status === 404) { showState('❓', 'Không tìm thấy đơn', 'Mã “' + p.code + '” không tồn tại. Kiểm tra lại mã trên phiếu.'); return null; }
          if (r.status === 429) { showState('⏳', 'Thử lại sau chút', 'Bạn tra cứu hơi nhanh. Vui lòng đợi một lát rồi thử lại.'); return null; }
          if (!r.ok) { showState('⚠️', 'Có lỗi xảy ra', 'Không tải được trạng thái đơn. Thử lại sau.'); return null; }
          return r.json();
        })
        .then(function (data) { if (data) render(data); })
        .catch(function () { showState('⚠️', 'Mất kết nối', 'Kiểm tra mạng và thử lại.'); });
    }

    load();
  </script>
</body>
</html>
